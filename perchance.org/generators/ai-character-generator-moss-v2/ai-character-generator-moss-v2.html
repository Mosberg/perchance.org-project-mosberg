<link
  rel="shortcut icon"
  href="https://raw.githubusercontent.com/Mosberg/perchance.org-project-mosberg/main/src/img/favicon.webp"
  type="image/x-icon"
/>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link
  href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
  rel="stylesheet"
/>

<style>
  body {
    font-family: "Fira Code", monospace;
    margin: 0;
    padding: 20px;
    background-color: #f0f0f0;
    background-size: contain;
  }

  header {
    text-align: center;
    margin-bottom: 40px;
  }

  header h1 {
    font-size: 2.5em;
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  header h1 img {
    width: 64px;
    height: 64px;
    margin-right: 15px;
  }

  header p {
    font-size: 1.2em;
    color: #555;
  }

  footer {
    text-align: center;
    margin-top: 40px;
    color: #777;
  }

  footer a {
    color: #007bff;
    text-decoration: none;
  }

  footer a:hover {
    text-decoration: underline;
  }
</style>

[generateHTML(settings)]

<footer>
  <p>
    &copy; 2026 <a href="https://github.com/Mosberg">Mosberg</a>. All rights
    reserved.
  </p>
</footer>
